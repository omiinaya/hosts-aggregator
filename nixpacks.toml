[phases.build]
cmds = [
  # Build frontend
  "cd /app/frontend && npm ci --no-audit --prefer-offline && npm run build",
  "test -d /app/frontend/dist || { echo 'ERROR: Frontend dist not found after build'; ls -la /app/frontend; exit 1; }",
  # Build backend
  "cd /app/backend && npm ci --no-audit --prefer-offline && npx prisma generate && npm run build",
  "test -d /app/backend/dist || { echo 'ERROR: Backend dist not found after build'; ls -la /app/backend; exit 1; }"
]

[phases.setup]
nixPkgs = ["nodejs_20"]

[start]
cmd = "cd /app/backend && npm start"

[variables]
NODE_ENV = "production"
PORT = "3181"
VITE_API_BASE_URL = "/api"
# Backend database & cache (override these in Coolify with real values)
DATABASE_URL = "file:./dev.db"
REDIS_URL = "redis://localhost:6379"
